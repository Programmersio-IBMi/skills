<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Application Map · iA by programmers.io</title>
<!--
  iA 3D Application Map — viewer template.
  DO NOT EDIT THIS FILE BY HAND and never edit a generated copy's script or CSS.
  The build script (scripts/build_app_map.py) validates the data JSON and injects
  it at the single DATA token below. Everything on screen (title, header,
  stats, legend, filters, tour) is driven from DATA.meta — no other placeholders.
  Requires internet access for the CDN modules (esm.sh). Open directly in any modern browser.
-->
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.180.0",
    "three/": "https://esm.sh/three@0.180.0/"
  }
}
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #040810; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; color: #dce8f2; }
  #graph { position: absolute; inset: 0; }

  .panel {
    position: absolute; z-index: 10;
    background: rgba(8, 16, 28, .82);
    border: 1px solid rgba(120, 180, 230, .18);
    border-radius: 12px;
    backdrop-filter: blur(8px);
    padding: 12px 16px;
  }
  #hdr { top: 16px; left: 16px; max-width: 420px; }
  #hdr h1 { font-size: 1.15em; letter-spacing: .4px; color: #fff; }
  #hdr h1 b { color: #4fc3f7; }
  #hdr .sub { font-size: .74em; color: #8fa8bd; margin-top: 2px; }
  #hdr .stats { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  #hdr .chip { font-size: .68em; background: rgba(79,195,247,.10); border: 1px solid rgba(79,195,247,.25);
               border-radius: 20px; padding: 2px 9px; color: #bfe3f7; white-space: nowrap; }

  #ctl { top: 16px; right: 16px; width: 252px; }
  #ctl input[type=text] {
    width: 100%; background: rgba(255,255,255,.06); border: 1px solid rgba(120,180,230,.25);
    border-radius: 7px; color: #eaf4fb; padding: 7px 10px; font-size: .85em; outline: none;
  }
  #ctl input[type=text]::placeholder { color: #6d8499; }
  #ctl .row { display: flex; gap: 6px; margin-top: 8px; }
  #ctl button {
    flex: 1; background: rgba(79,195,247,.12); color: #bfe3f7; border: 1px solid rgba(79,195,247,.3);
    border-radius: 7px; padding: 6px 4px; font-size: .72em; cursor: pointer; transition: background .15s;
  }
  #ctl button:hover { background: rgba(79,195,247,.28); }
  #ctl button.on { background: rgba(79,195,247,.4); color: #fff; }
  #filters { margin-top: 10px; display: flex; flex-direction: column; gap: 3px; }
  #filters label { display: flex; align-items: center; gap: 7px; font-size: .76em; cursor: pointer; color: #c3d4e2; }
  #filters input { accent-color: #4fc3f7; }
  #filters .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

  #legend { bottom: 16px; left: 16px; font-size: .7em; max-width: 330px; }
  #legend h3 { font-size: 1em; color: #9fc1d8; margin-bottom: 6px; letter-spacing: .5px; }
  #legend .lrow { display: flex; flex-wrap: wrap; gap: 5px 14px; margin-bottom: 8px; }
  #legend span { display: inline-flex; align-items: center; gap: 5px; color: #b7c9d8; }
  #legend i { width: 18px; height: 3px; border-radius: 2px; display: inline-block; }

  #info {
    top: 50%; right: 16px; transform: translateY(-50%);
    width: 300px; max-height: 72vh; overflow-y: auto; display: none;
  }
  #info.open { display: block; }
  #info h2 { font-size: 1.05em; color: #fff; display: flex; align-items: center; gap: 8px; }
  #info h2 .dot { width: 12px; height: 12px; border-radius: 4px; }
  #info .kind { font-size: .68em; color: #8fa8bd; margin: 2px 0 8px; text-transform: uppercase; letter-spacing: .8px; }
  #info .desc { font-size: .8em; color: #cfdde9; margin-bottom: 9px; line-height: 1.45; }
  #info .meta { font-size: .72em; color: #8fa8bd; border-top: 1px solid rgba(120,180,230,.15); padding-top: 7px; margin-bottom: 9px; }
  #info .meta b { color: #c3d4e2; }
  #info h4 { font-size: .72em; color: #9fc1d8; text-transform: uppercase; letter-spacing: .8px; margin: 9px 0 4px; }
  #info .conn { font-size: .78em; padding: 3px 6px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 7px; color: #cfdde9; }
  #info .conn:hover { background: rgba(79,195,247,.12); }
  #info .conn .dot { width: 8px; height: 8px; border-radius: 2px; flex: none; }
  #info .conn small { color: #7d94a8; margin-left: auto; padding-left: 8px; white-space: nowrap; }
  #info .close { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #7d94a8; font-size: 1.1em; }
  #info .close:hover { color: #fff; }

  #tour {
    bottom: 22px; left: 50%; transform: translateX(-50%);
    width: 560px; max-width: 86vw; display: none; text-align: center;
    border-color: rgba(255, 213, 74, .35);
  }
  #tour.open { display: block; }
  #tour h3 { color: #ffd54a; font-size: .95em; margin-bottom: 4px; }
  #tour p { font-size: .82em; color: #d7e4ee; line-height: 1.5; }
  #tour .nav { margin-top: 9px; display: flex; justify-content: center; gap: 8px; }
  #tour .nav button {
    background: rgba(255,213,74,.12); color: #ffe18a; border: 1px solid rgba(255,213,74,.4);
    border-radius: 7px; padding: 5px 16px; font-size: .75em; cursor: pointer;
  }
  #tour .nav button:hover { background: rgba(255,213,74,.3); }
  #tour .step { font-size: .66em; color: #8fa8bd; margin-top: 6px; }

  #foot { bottom: 16px; right: 16px; font-size: .64em; color: #5d7488; background: none; border: none; padding: 0; }

  .scene-tooltip { font-family: 'Segoe UI', system-ui, sans-serif !important; }
  .tt { background: rgba(8,16,28,.92); border: 1px solid rgba(120,180,230,.3); border-radius: 8px;
        padding: 7px 11px; font-size: 12px; color: #dce8f2; max-width: 260px; line-height: 1.4; }
  .tt b { color: #4fc3f7; }
  .tt .k { color: #8fa8bd; font-size: 10px; text-transform: uppercase; letter-spacing: .6px; }
</style>
</head>
<body>
<div id="graph"></div>

<div id="hdr" class="panel">
  <h1 id="hdrTitle"></h1>
  <div class="sub" id="hdrSub"></div>
  <div class="stats" id="stats"></div>
</div>

<div id="ctl" class="panel">
  <input type="text" id="search" list="nodeNames" placeholder="🔍 Find an object…">
  <datalist id="nodeNames"></datalist>
  <div class="row">
    <button id="btnTour">▶ Guided tour</button>
    <button id="btnLayout">Top-down view</button>
  </div>
  <div class="row">
    <button id="btnParticles" class="on">Data flow: ON</button>
    <button id="btnReset">Reset view</button>
  </div>
  <div id="filters"></div>
</div>

<div id="legend" class="panel">
  <h3>CONNECTIONS</h3>
  <div class="lrow" id="linkLegend"></div>
</div>

<div id="info" class="panel">
  <div class="close" id="infoClose">✕</div>
  <h2><span class="dot" id="infoDot"></span><span id="infoName"></span></h2>
  <div class="kind" id="infoKind"></div>
  <div class="desc" id="infoDesc"></div>
  <div class="meta" id="infoMeta"></div>
  <div id="infoConns"></div>
</div>

<div id="tour" class="panel">
  <h3 id="tourTitle"></h3>
  <p id="tourText"></p>
  <div class="nav">
    <button id="tourPrev">← Back</button>
    <button id="tourNext">Next →</button>
    <button id="tourExit">Exit tour</button>
  </div>
  <div class="step" id="tourStep"></div>
</div>

<div id="foot" class="panel"></div>

<script type="module">
import ForceGraph3D from 'https://esm.sh/3d-force-graph@1.79.0?external=three';
import SpriteText from 'https://esm.sh/three-spritetext@1.10.0?external=three';
import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';
import * as THREE from 'three';

/* ───────────────────────── DATA (injected by build_app_map.py) ───────────────────────── */
const DATA = __APP_MAP_DATA__;

const META = DATA.meta || {};

/* ───────────────────────── STYLE TABLES (fixed vocabulary — never edit) ───────────────────────── */
const NODE_STYLE = {
  MENU:    { color: '#ffd54a', label: 'Menu' },
  PGM_RPG: { color: '#4fc3f7', label: 'RPG program' },
  PGM_CL:  { color: '#b388ff', label: 'CL program' },
  DSPF:    { color: '#69f0ae', label: 'Screen (display file)' },
  PF:      { color: '#ffb74d', label: 'Data file' },
  PRTF:    { color: '#ff8a9e', label: 'Report (printer file)' },
  SOURCE:  { color: '#90a4ae', label: 'Uncompiled source' },
  EXT:     { color: '#78909c', label: 'External program (out of scope)' }
};
const LINK_STYLE = {
  MENU:    { color: '#ffd54a', particles: 3, speed: .006, width: 1.6, plabel: 'menu launch' },
  CALL:    { color: '#4fc3f7', particles: 3, speed: .007, width: 1.6, plabel: 'program call' },
  SBMJOB:  { color: '#ff5252', particles: 5, speed: .010, width: 2.2, plabel: 'batch submit (SBMJOB)' },
  INPUT:   { color: '#26c6da', particles: 2, speed: .004, width: 1.2, plabel: 'file read' },
  UPDATE:  { color: '#ffa726', particles: 2, speed: .004, width: 1.4, plabel: 'file read + write' },
  DISPLAY: { color: '#69f0ae', particles: 2, speed: .004, width: 1.2, plabel: 'screen I/O' },
  PRINT:   { color: '#ff8a9e', particles: 2, speed: .005, width: 1.4, plabel: 'report output' }
};

/* ───────────────────────── HEADER / TITLE (driven from META) ───────────────────────── */
{
  const scopeName = META.area ? `${META.library} · ${META.area}` : (META.library || '');
  document.title = `${scopeName} — 3D Application Map · iA by programmers.io`;
  document.getElementById('hdrTitle').innerHTML = `<b>${scopeName}</b> — 3D Application Map`;
  document.getElementById('hdrSub').textContent =
    `iA by programmers.io · generated ${META.generated || ''} from repository ${META.repository || ''}`;
  document.getElementById('foot').textContent = 'iA by programmers.io · Three.js force graph';
}

/* ───────────────────────── ADJACENCY ───────────────────────── */
const nodeById = Object.fromEntries(DATA.nodes.map(n => [n.id, n]));
const neighbors = {};   // id -> Set(id)
const nodeLinks = {};   // id -> [link]
DATA.nodes.forEach(n => { neighbors[n.id] = new Set(); nodeLinks[n.id] = []; });
DATA.links.forEach(l => {
  neighbors[l.source].add(l.target); neighbors[l.target].add(l.source);
  nodeLinks[l.source].push(l); if (l.source !== l.target) nodeLinks[l.target].push(l);
});

/* ───────────────────────── STATE ───────────────────────── */
let selected = null;
let particlesOn = true;
let dagOn = false;
let tourIdx = -1;
const presentKinds = new Set(DATA.nodes.map(n => n.kind));
const visibleKinds = new Set(presentKinds);

const idOf = x => typeof x === 'object' ? x.id : x;
const esc = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const nodeRadius = n => {
  if (n.kind === 'MENU') return 11;
  if (n.kind === 'EXT') return 6;
  const lines = n.lines || 60;
  return Math.min(16, Math.max(4.5, 3.5 + Math.sqrt(lines) * .42));
};

/* ───────────────────────── GRAPH ───────────────────────── */
const Graph = new ForceGraph3D(document.getElementById('graph'), { controlType: 'orbit' })
  .backgroundColor('#040810')
  .graphData(DATA)
  .showNavInfo(false)
  .nodeThreeObject(node => {
    const r = nodeRadius(node);
    const color = NODE_STYLE[node.kind].color;
    const group = new THREE.Group();
    let geo, mat;
    switch (node.kind) {
      case 'MENU':    geo = new THREE.IcosahedronGeometry(r, 1); break;
      case 'PGM_RPG': geo = new THREE.SphereGeometry(r, 24, 16); break;
      case 'PGM_CL':  geo = new THREE.OctahedronGeometry(r * 1.1, 0); break;
      case 'DSPF':    geo = new THREE.BoxGeometry(r * 2, r * 1.4, r * .3); break;
      case 'PF':      geo = new THREE.CylinderGeometry(r * .85, r * .85, r * 1.3, 24); break;
      case 'PRTF':    geo = new THREE.ConeGeometry(r * .85, r * 1.7, 20); break;
      case 'SOURCE':  geo = new THREE.SphereGeometry(r, 14, 10); break;
      case 'EXT':     geo = new THREE.TetrahedronGeometry(r * 1.3, 0); break;
    }
    if (node.kind === 'SOURCE' || node.kind === 'EXT') {
      mat = new THREE.MeshBasicMaterial({ color, wireframe: true, transparent: true,
                                          opacity: node.kind === 'EXT' ? .85 : .55 });
    } else {
      mat = new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: .45, transparent: true, opacity: .95 });
    }
    mat.userData.baseOpacity = mat.opacity;
    const mesh = new THREE.Mesh(geo, mat);
    group.add(mesh);

    const label = new SpriteText(node.id);
    label.color = '#e8f1f8';
    label.textHeight = Math.max(3.4, r * .42);
    label.position.y = -(r + 6);
    label.material.transparent = true;
    label.material.userData.baseOpacity = 1;
    group.add(label);
    return group;
  })
  .nodeLabel(n => `<div class="tt"><b>${esc(n.id)}</b><div class="k">${NODE_STYLE[n.kind].label}${n.attr ? ' · ' + esc(n.attr) : ''}${n.lines ? ' · ' + n.lines.toLocaleString() + ' lines' : ''}</div>${esc(n.desc)}</div>`)
  .nodeVisibility(n => visibleKinds.has(n.kind))
  .linkVisibility(l => visibleKinds.has(nodeById[idOf(l.source)].kind) && visibleKinds.has(nodeById[idOf(l.target)].kind))
  .linkLabel(l => `<div class="tt"><b>${esc(idOf(l.source))} → ${esc(idOf(l.target))}</b><div class="k">${LINK_STYLE[l.kind].plabel}</div>${esc(l.label)}${l.job ? `<br>Job: <b>${esc(l.job)}</b> · Queue: ${esc(l.jobQueue)}` : ''}</div>`)
  .linkColor(l => linkDimmed(l) ? 'rgba(70,90,110,0.18)' : LINK_STYLE[l.kind].color)
  .linkWidth(l => linkDimmed(l) ? .4 : LINK_STYLE[l.kind].width * (isLinkSelected(l) ? 1.7 : 1))
  .linkOpacity(.55)
  .linkCurvature(l => idOf(l.source) === idOf(l.target) ? .8 : .18)
  .linkDirectionalArrowLength(l => linkDimmed(l) ? 0 : 3.6)
  .linkDirectionalArrowRelPos(.92)
  .linkDirectionalParticles(l => (particlesOn && !linkDimmed(l)) ? LINK_STYLE[l.kind].particles : 0)
  .linkDirectionalParticleWidth(l => LINK_STYLE[l.kind].width + .6)
  .linkDirectionalParticleSpeed(l => LINK_STYLE[l.kind].speed)
  .linkDirectionalParticleColor(l => LINK_STYLE[l.kind].color)
  .onNodeClick(node => selectNode(node))
  .onNodeHover(n => document.getElementById('graph').style.cursor = n ? 'pointer' : null)
  .onBackgroundClick(() => clearSelection())
  .onDagError(() => {});   // tolerate the SBMJOB self-loops in top-down mode

Graph.d3Force('charge').strength(-170);
Graph.d3Force('link').distance(l =>
  ({ MENU: 75, CALL: 55, SBMJOB: 30, INPUT: 48, UPDATE: 48, DISPLAY: 42, PRINT: 42 })[l.kind] || 50);

/* Bloom glow */
const bloom = new UnrealBloomPass();
bloom.strength = 1.15; bloom.radius = .55; bloom.threshold = .08;
Graph.postProcessingComposer().addPass(bloom);

/* Starfield backdrop */
{
  const starGeo = new THREE.BufferGeometry();
  const pos = [];
  for (let i = 0; i < 1400; i++) {
    const r = 1400 + Math.random() * 2200;
    const theta = Math.random() * Math.PI * 2, phi = Math.acos(2 * Math.random() - 1);
    pos.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x88aacc, size: 1.6, transparent: true, opacity: .7, sizeAttenuation: true }));
  Graph.scene().add(stars);
}

/* Intro framing + gentle auto-rotate until first interaction */
let introDone = false;
Graph.onEngineStop(() => {
  if (!introDone) { introDone = true; Graph.zoomToFit(1400, 90); }
});
Graph.controls().autoRotate = true;
Graph.controls().autoRotateSpeed = .55;
document.getElementById('graph').addEventListener('pointerdown', () => { Graph.controls().autoRotate = false; }, { once: true });

/* ───────────────────────── SELECTION / HIGHLIGHT ───────────────────────── */
function isLinkSelected(l) {
  if (!selected) return false;
  return idOf(l.source) === selected.id || idOf(l.target) === selected.id;
}
function linkDimmed(l) {
  if (!selected) return false;
  return !isLinkSelected(l);
}
function nodeDimmed(n) {
  if (!selected) return false;
  return n.id !== selected.id && !neighbors[selected.id].has(n.id);
}
function applyHighlight() {
  Graph.graphData().nodes.forEach(n => {
    const obj = n.__threeObj;
    if (!obj) return;
    const dim = nodeDimmed(n);
    obj.traverse(o => {
      if (o.material && o.material.userData.baseOpacity !== undefined) {
        o.material.opacity = dim ? o.material.userData.baseOpacity * .10 : o.material.userData.baseOpacity;
      }
    });
  });
  // re-run link accessors
  Graph.linkColor(Graph.linkColor())
       .linkWidth(Graph.linkWidth())
       .linkDirectionalArrowLength(Graph.linkDirectionalArrowLength())
       .linkDirectionalParticles(Graph.linkDirectionalParticles());
}
function focusNode(node, dist = 110) {
  const d = Math.hypot(node.x, node.y, node.z) || 1;
  const ratio = 1 + dist / d;
  Graph.cameraPosition({ x: node.x * ratio, y: node.y * ratio, z: node.z * ratio }, node, 1400);
}
function selectNode(node, fly = true) {
  selected = node;
  applyHighlight();
  showInfo(node);
  if (fly) focusNode(node);
}
function clearSelection() {
  selected = null;
  applyHighlight();
  document.getElementById('info').classList.remove('open');
}

/* ───────────────────────── INFO PANEL ───────────────────────── */
function connEntries(node) {
  const out = [];
  nodeLinks[node.id].forEach(l => {
    const s = idOf(l.source), t = idOf(l.target);
    const st = LINK_STYLE[l.kind];
    if (l.kind === 'SBMJOB' && s === node.id && t === node.id) {
      out.push({ other: node.id, color: st.color, text: `Re-submits itself to batch`, sub: `job ${l.job}`, self: true });
      return;
    }
    const isSource = s === node.id;
    const other = isSource ? t : s;
    const verbs = {
      MENU:    isSource ? 'Launches' : 'Launched from menu',
      CALL:    isSource ? 'Calls' : 'Called by',
      SBMJOB:  isSource ? 'Submits' : 'Submitted by',
      INPUT:   isSource ? 'Read by' : 'Reads',
      UPDATE:  isSource ? 'Reads + writes' : 'Updated by',
      DISPLAY: isSource ? 'Drives screen' : 'Screen driven by',
      PRINT:   isSource ? 'Writes report' : 'Written by'
    };
    out.push({ other, color: st.color, text: `${verbs[l.kind]} ${other}`, sub: l.job ? `job ${l.job}` : st.plabel });
  });
  return out;
}
function showInfo(node) {
  const st = NODE_STYLE[node.kind];
  document.getElementById('infoDot').style.background = st.color;
  document.getElementById('infoName').textContent = node.id;
  document.getElementById('infoKind').textContent = st.label + (node.attr ? ' · ' + node.attr : '');
  document.getElementById('infoDesc').textContent = node.desc || '';
  const meta = [];
  if (node.lines) meta.push(`<b>${node.lines.toLocaleString()}</b> source lines`);
  if (node.stats?.execLines) meta.push(`<b>${node.stats.execLines.toLocaleString()}</b> executable`);
  if (node.stats?.subroutines) meta.push(`<b>${node.stats.subroutines}</b> subroutines`);
  if (node.stats?.procedures) meta.push(`<b>${node.stats.procedures}</b> procedures`);
  if (node.stats?.sql) meta.push(`<b>${node.stats.sql}</b> SQL statements`);
  if (node.sourceFile) meta.push(`source <b>${esc(node.sourceFile)}</b>`);
  document.getElementById('infoMeta').innerHTML = meta.join(' · ') || '—';
  const conns = connEntries(node);
  const wrap = document.getElementById('infoConns');
  wrap.innerHTML = conns.length ? '<h4>Connections (' + conns.length + ')</h4>' : '<h4>No connections — isolated object</h4>';
  conns.forEach(c => {
    const div = document.createElement('div');
    div.className = 'conn';
    div.innerHTML = `<span class="dot" style="background:${c.color}"></span>${esc(c.text)}<small>${esc(c.sub)}</small>`;
    if (!c.self) div.onclick = () => {
      const n = Graph.graphData().nodes.find(n => n.id === c.other);
      if (n) selectNode(n);
    };
    wrap.appendChild(div);
  });
  document.getElementById('info').classList.add('open');
}
document.getElementById('infoClose').onclick = clearSelection;

/* ───────────────────────── HEADER STATS / LEGEND / FILTERS ───────────────────────── */
{
  const counts = {};
  DATA.nodes.forEach(n => counts[n.kind] = (counts[n.kind] || 0) + 1);
  const pl = (n, word) => `${n} ${word}${n === 1 ? '' : 's'}`;
  const chips = [];
  const programs = (counts.PGM_RPG || 0) + (counts.PGM_CL || 0);
  if (programs) chips.push(pl(programs, 'program'));
  if (counts.MENU) chips.push(pl(counts.MENU, 'menu'));
  if (counts.PF) chips.push(pl(counts.PF, 'data file'));
  if (counts.DSPF) chips.push(pl(counts.DSPF, 'screen'));
  if (counts.PRTF) chips.push(pl(counts.PRTF, 'report'));
  if (counts.SOURCE) chips.push(`${counts.SOURCE} uncompiled source`);
  if (counts.EXT) chips.push(`${counts.EXT} external`);
  chips.push(pl(DATA.links.length, 'connection'));
  if (META.scope && META.scope.mappedObjects < META.scope.totalObjects) {
    chips.push(`${META.scope.mappedObjects} of ${META.scope.totalObjects} objects mapped`);
  }
  document.getElementById('stats').innerHTML = chips.map(c => `<span class="chip">${c}</span>`).join('');

  const presentLinkKinds = new Set(DATA.links.map(l => l.kind));
  document.getElementById('linkLegend').innerHTML = Object.entries(LINK_STYLE)
    .filter(([kind]) => presentLinkKinds.has(kind))
    .map(([, s]) => `<span><i style="background:${s.color}"></i>${s.plabel}</span>`).join('');

  const fl = document.getElementById('filters');
  Object.entries(NODE_STYLE).forEach(([kind, st]) => {
    if (!presentKinds.has(kind)) return;
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" checked data-kind="${kind}"><span class="dot" style="background:${st.color}"></span>${st.label}`;
    label.querySelector('input').onchange = e => {
      e.target.checked ? visibleKinds.add(kind) : visibleKinds.delete(kind);
      Graph.nodeVisibility(Graph.nodeVisibility()).linkVisibility(Graph.linkVisibility());
    };
    fl.appendChild(label);
  });

  const dl = document.getElementById('nodeNames');
  DATA.nodes.forEach(n => { const o = document.createElement('option'); o.value = n.id; dl.appendChild(o); });
}

/* ───────────────────────── CONTROLS ───────────────────────── */
document.getElementById('search').addEventListener('change', e => {
  const n = Graph.graphData().nodes.find(n => n.id === e.target.value.trim().toUpperCase());
  if (n) { selectNode(n); e.target.blur(); }
});
document.getElementById('btnReset').onclick = () => { clearSelection(); Graph.zoomToFit(1200, 90); };
document.getElementById('btnParticles').onclick = function () {
  particlesOn = !particlesOn;
  this.textContent = `Data flow: ${particlesOn ? 'ON' : 'OFF'}`;
  this.classList.toggle('on', particlesOn);
  Graph.linkDirectionalParticles(Graph.linkDirectionalParticles());
};
document.getElementById('btnLayout').onclick = function () {
  dagOn = !dagOn;
  this.textContent = dagOn ? 'Free 3D view' : 'Top-down view';
  this.classList.toggle('on', dagOn);
  Graph.dagMode(dagOn ? 'td' : null).dagLevelDistance(80);
  setTimeout(() => Graph.zoomToFit(1200, 90), 900);
};

/* ───────────────────────── GUIDED TOUR (steps come from META.tour) ───────────────────────── */
const TOUR = Array.isArray(META.tour) ? META.tour : [];
if (!TOUR.length) document.getElementById('btnTour').style.display = 'none';
function tourShow(i) {
  tourIdx = i;
  const step = TOUR[i];
  document.getElementById('tour').classList.add('open');
  document.getElementById('tourTitle').textContent = step.title;
  document.getElementById('tourText').textContent = step.text;
  document.getElementById('tourStep').textContent = `Step ${i + 1} of ${TOUR.length}`;
  if (step.focus) {
    const n = Graph.graphData().nodes.find(n => n.id === step.focus);
    if (n) selectNode(n);
  }
}
function tourExit() {
  tourIdx = -1;
  document.getElementById('tour').classList.remove('open');
  clearSelection();
  Graph.zoomToFit(1200, 90);
}
document.getElementById('btnTour').onclick = () => { Graph.controls().autoRotate = false; tourShow(0); };
document.getElementById('tourNext').onclick = () => tourIdx < TOUR.length - 1 ? tourShow(tourIdx + 1) : tourExit();
document.getElementById('tourPrev').onclick = () => tourIdx > 0 && tourShow(tourIdx - 1);
document.getElementById('tourExit').onclick = tourExit;

/* ───────────────────────── RESIZE ───────────────────────── */
window.addEventListener('resize', () => Graph.width(window.innerWidth).height(window.innerHeight));
</script>
</body>
</html>
